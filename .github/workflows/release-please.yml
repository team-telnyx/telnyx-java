name: Release Please

# Self-hosted release-please for team-telnyx/telnyx-java.
#
# The stlc generate pipeline pushes generated SDK code directly to the
# `next` branch (with a `Release-As: X.Y.Z` footer). This workflow
# runs release-please when `next` receives new commits, which:
#   1. Reads conventional commits from `next` (--changes-branch)
#   2. Opens a release PR targeting `master` (--target-branch)
#   3. On merge, tags vX.Y.Z and creates a GitHub Release
#   4. publish-sonatype.yml picks up the release event and publishes to Maven Central
#
# This replaces the Stainless SaaS mirror that previously synced
# stainless-sdks/telnyx-java → team-telnyx/telnyx-java.

on:
  push:
    branches:
      - next

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.repository == 'team-telnyx/telnyx-java'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SDK_WRITE_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install release-please
        run: npm install stainless-api/release-please

      - name: Run release-please (release-pr)
        id: release-pr
        run: |
          OUTPUT=$(npx release-please release-pr \
            --repo-url "${{ github.repositoryUrl }}" \
            --token "${{ secrets.SDK_WRITE_TOKEN }}" \
            --target-branch master \
            --changes-branch next \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            2>&1) || true
          echo "$OUTPUT"

          # Parse PR number from output if a PR was created
          PR_URL=$(echo "$OUTPUT" | grep -oP 'https://github\.com/[^/]+/[^/]+/pull/\d+' | head -1)
          if [ -n "$PR_URL" ]; then
            PR_NUM=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "prs_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "prs_created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-please (github-release)
        run: |
          npx release-please github-release \
            --repo-url "${{ github.repositoryUrl }}" \
            --token "${{ secrets.SDK_WRITE_TOKEN }}" \
            --target-branch master \
            --changes-branch next \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            2>&1 || true

      - name: Enable auto-merge on release PRs
        if: steps.release-pr.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_WRITE_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.release-pr.outputs.pr_number }}
        run: |
          if [ -n "$PR_NUM" ]; then
            gh pr merge "$PR_NUM" --auto --merge --repo "$REPO" 2>/dev/null || echo "Auto-merge already enabled or PR #$PR_NUM not mergeable"
          fi
          sleep 3
          # Fallback: enable auto-merge on any open release PRs
          prs=$(gh pr list --repo "$REPO" --state open --label "autorelease: pending" --json number --jq '.[].number')
          for pr in $prs; do
            gh pr merge "$pr" --auto --merge --repo "$REPO" 2>/dev/null || true
          done
